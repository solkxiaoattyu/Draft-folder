            const picked = new Set();
            while (picked.size < modelCount && picked.size < totalSlots) {
                picked.add(Math.floor(Math.random() * totalSlots));
            }
            return picked;
        }

                    img: FEIGAO_IMAGE_SEQUENCE[modelCursor % FEIGAO_IMAGE_SEQUENCE.length],

            feigaoCursor += 1;
            return data;

            // 确保从顶部开始：避免刷新/历史恢复后出现初始偏移
            scrollPos = 0;
            targetScrollPos = 0;
            targetRotationY = 0;
            currentRotationY = 0;
            if (vortexGroup) {
                vortexGroup.position.y = 0;
                vortexGroup.rotation.y = 0;
            }
            window.scrollTo(0, 0);
            if (document.documentElement) document.documentElement.scrollTop = 0;
            if (document.body) document.body.scrollTop = 0;

            updateBumengScrollBackground();
            vortexGroup.scale.set(0.6, 0.6, 0.6);
            renderer.domElement.style.filter = 'blur(20px)';
            if (typeof gsap !== 'undefined') {
                gsap.to(vortexGroup.scale, {
                    x: 1,
                    y: 1,
                    z: 1,
                    duration: 1.2,
                    ease: 'power3.out'
                });
                gsap.to(renderer.domElement.style, {
                    filter: 'blur(0px)',
                    duration: 1.2
                });
            }
            
            animate();
        }

        function createVortex() {
            const textureLoader = new THREE.TextureLoader();
            const cardGeometry = new THREE.PlaneGeometry(3, 2.2); 

            const radius = 6;
            const heightStep = 1.8;
            const angleStep = Math.PI / 3.5; 

            CARD_DATA.forEach((data, i) => {
                let borderColor = '#ffffff';
                const replacement = MODEL_REPLACEMENTS.get(i);

                if (replacement) {
                    createModelAnchor(data, i, replacement, radius, heightStep, angleStep);
                    return;
                }

                const anchor = createSpiralAnchor(data, i, radius, heightStep, angleStep);
                addPhotoToAnchor(anchor, data, borderColor, textureLoader, cardGeometry);
            });
        }

        function createFloatingGallery() {
            const textureLoader = new THREE.TextureLoader();
            const galleryCount = Math.min(52, Math.max(42, CARD_DATA.length + 16));
            const placedPositions = [];
            const galleryLayers = [
                { xRadius: 24, yRadius: 13.5, zBase: -8.2, zCurveX: 6.5, zCurveY: 2.8, depthJitter: 0.8 },
                { xRadius: 31, yRadius: 20.5, zBase: -16.8, zCurveX: 8.8, zCurveY: 4.1, depthJitter: 1.2 }
            ];

            floatingGalleryItems = [];

            for (let i = 0; i < galleryCount; i++) {
                const imgUrl = BACKGROUND_FLOATING_CARD_IMAGE;
                let x = 0;
                let y = 0;
                let z = 0;
                let bestCandidate = null;
                let layerIndex = Math.random() < 0.48 ? 0 : 1;

                for (let attempt = 0; attempt < 24; attempt++) {
                    const layer = galleryLayers[layerIndex];
                    const theta = THREE.MathUtils.randFloat(-1.18, 1.18);
                    const phiBase = THREE.MathUtils.randFloat(-1, 1);
                    const phi = (Math.random() < 0.42)
                        ? Math.sign(phiBase || 1) * THREE.MathUtils.lerp(0.45, 0.92, Math.abs(phiBase))
                        : phiBase * 0.82;
                    const candidate = {
                        layerIndex,
                        theta,
                        phi,
                        x: Math.sin(theta) * layer.xRadius + THREE.MathUtils.randFloatSpread(1.2),
                        y: Math.sin(phi) * layer.yRadius + THREE.MathUtils.randFloatSpread(1),
                        z: layer.zBase - (Math.cos(theta) * layer.zCurveX) - (Math.cos(phi) * layer.zCurveY) + THREE.MathUtils.randFloatSpread(layer.depthJitter)
                    };
                    const candidateDepthT = THREE.MathUtils.clamp((candidate.z + 29) / 22, 0, 1);
                    const minDistance = THREE.MathUtils.lerp(4.4, 7.1, candidateDepthT) + (layerIndex === 0 ? 0.2 : 0);
                    const nearestDistance = placedPositions.reduce((nearest, placed) => {
                        const dx = candidate.x - placed.x;
                        const dy = candidate.y - placed.y;
                        const dz = (candidate.z - placed.z) * 0.45;
                        const distance = Math.sqrt(dx * dx + dy * dy + dz * dz);
                        return Math.min(nearest, distance);
                    }, Infinity);

                    if (nearestDistance >= minDistance) {
                        bestCandidate = candidate;
                        break;
                    }

                    if (!bestCandidate || nearestDistance > bestCandidate.nearestDistance) {
                        bestCandidate = { ...candidate, nearestDistance };
                    }
                }

                x = bestCandidate.x;
                y = bestCandidate.y;
                z = bestCandidate.z;
                layerIndex = bestCandidate.layerIndex;
                placedPositions.push({ x, y, z });

                const depthT = THREE.MathUtils.clamp((z + 30) / 24, 0, 1);
                const sizeVariant = THREE.MathUtils.randFloat(0.86, 1.08) * (Math.random() < 0.32 ? 0.76 : 1);
                const scale = THREE.MathUtils.lerp(0.56, 1.22, depthT) * sizeVariant;
                const opacity = THREE.MathUtils.lerp(0.08, 0.34, depthT);
                const pitchOffset = (bestCandidate.phi * 0.08) + THREE.MathUtils.randFloat(-0.04, 0.04);
                const rollOffset = THREE.MathUtils.randFloat(-0.14, 0.14);

                addFloatingGalleryCard(textureLoader, imgUrl, x, y, z, {
                    opacity,
                    scale,
                    pitchOffset,
                    rollOffset,
                    phase: Math.random() * Math.PI * 2,
                    floatAmp: THREE.MathUtils.randFloat(0.16, 0.52),
                    floatSpeed: THREE.MathUtils.randFloat(0.35, 0.75),
                    depthDrift: THREE.MathUtils.randFloat(0.08, 0.24) * (layerIndex === 0 ? 1.15 : 0.8)
                });
            }
        }

        function createSpiralAnchor(data, index, radius, heightStep, angleStep) {
            const anchor = new THREE.Group();
            const angle = index * angleStep;
            const y = (index * heightStep) - (CARD_DATA.length * heightStep / 2);
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;

            anchor.position.set(x, y, z);
            anchor.lookAt(0, y, 0);
            anchor.rotateY(Math.PI);
            anchor.rotateX((Math.random() - 0.5) * 0.2);
            anchor.rotateZ((Math.random() - 0.5) * 0.2);
            anchor.userData = { ...data, id: index };

            vortexGroup.add(anchor);
            cards.push(anchor);

            return anchor;
        }

        function addInteractionData(object3D, cardData) {
            object3D.traverse((child) => {
                if (child.isMesh || child.isLine) {
                    child.userData.cardData = cardData;
                }
            });
        }

        /** 与 CSS object-fit: cover 等效，避免平面与图比例不一致时拉伸变形 */
        function applyTextureCover(texture, planeWidth, planeHeight) {
            const img = texture.image;
            if (!img || !img.width || !img.height) return;
            const iw = img.naturalWidth || img.width;
            const ih = img.naturalHeight || img.height;
            if (!iw || !ih) return;
            const planeRatio = planeWidth / planeHeight;
            const imageRatio = iw / ih;
            texture.wrapS = THREE.ClampToEdgeWrapping;
            texture.wrapT = THREE.ClampToEdgeWrapping;
            if (imageRatio > planeRatio) {
                const r = planeRatio / imageRatio;
                texture.repeat.set(r, 1);
                texture.offset.set((1 - r) / 2, 0);
            } else {
                const r = imageRatio / planeRatio;
                texture.repeat.set(1, r);
                texture.offset.set(0, (1 - r) / 2);
            }
        }

        function createFallbackTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 4;
            canvas.height = 4;
            const ctx = canvas.getContext('2d');
            if (ctx) {
                ctx.fillStyle = '#3a3550';
                ctx.fillRect(0, 0, 4, 4);
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.encoding = THREE.sRGBEncoding;
            return texture;
        }

        /**
         * 本地资源：按路径段编码后拼到站点根（http://127.0.0.1:5500/feigao/xxx.png），
         * 避免 encodeURI + new URL 对已编码 % 的路径解析出错导致 404 / onerror 全走占位色。
         */
        function resolveAssetUrl(raw) {
            if (!raw || typeof raw !== 'string') return '';
            if (/^https?:\/\//i.test(raw)) return raw;
            const parts = raw.split('/').filter(Boolean);
            const encoded = parts.map((seg) => {
                try {
                    return encodeURIComponent(decodeURIComponent(seg));
                } catch (e) {
                    return encodeURIComponent(seg);
                }
            }).join('/');
            return `${window.location.origin}/${encoded}`;
        }

        /**
         * 使用 Image + THREE.Texture：比 TextureLoader 对本地中文路径更稳；
         * textureLoader 参数保留以兼容调用方，可不传。
         */
        function loadTextureForPlane(textureLoader, url, planeWidth, planeHeight, onLoaded) {
            const tryLoad = (srcRaw, isFallback) => {
                const srcResolved = resolveAssetUrl(srcRaw);
                const img = new Image();
                img.decoding = 'async';
                img.onload = () => {
                    const texture = new THREE.Texture(img);
                    texture.needsUpdate = true;
                    texture.minFilter = THREE.LinearFilter;
                    texture.encoding = THREE.sRGBEncoding;
                    applyTextureCover(texture, planeWidth, planeHeight);
                    onLoaded(texture);
                };
                img.onerror = () => {
                    if (!isFallback && FEIGAO_IMAGE_SEQUENCE.length) {
                        tryLoad(FEIGAO_IMAGE_SEQUENCE[0], true);
                    } else {
                        onLoaded(createFallbackTexture());
                    }
                };
                img.src = srcResolved;
            };
            tryLoad(url, false);
        }

        function createModelAnchor(data, index, replacement, radius, heightStep, angleStep) {
            const anchor = createSpiralAnchor(data, index, radius, heightStep, angleStep);
            const hangerGeometry = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(0, 1.35, 0),
                new THREE.Vector3(0, 0.3, 0)
            ]);
            const hanger = new THREE.Line(
                hangerGeometry,
                new THREE.LineBasicMaterial({
                    color: 0xF6F4F9,
                    transparent: true,
                    opacity: 0.65
                })
            );
            const wrapper = new THREE.Group();
            const glowSize = replacement.glowSize || 5.2;
            const modelGlow = createGlowPlane(glowSize, glowSize, replacement.tint, 0.42);

            wrapper.position.y = replacement.yOffset || 0;
            wrapper.position.z = replacement.zOffset || 0.55;
            hanger.userData.cardData = anchor.userData;
            modelGlow.position.z = (replacement.zOffset || 0.55) - 0.25;
            modelGlow.position.y = replacement.yOffset || 0;
            anchor.add(hanger);
            anchor.add(modelGlow);

            loadGlbGeometryOnly(getAssetUrl(replacement.file), replacement.tint).then((model) => {

                modelAnchors.push({

                    glow: modelGlow,

                wrapper.add(fallbackModel);

                modelAnchors.push({
                    wrapper,
                    glow: modelGlow,

        function getAssetUrl(file) {
            return `${encodeURI(file)}?v=${ASSET_VERSION}`;
        }

        function patchBlobTextureFallback() {
            if (THREE.ImageLoader.prototype.__blobTextureFallbackPatched) return;

            const originalLoad = THREE.ImageLoader.prototype.load;

            THREE.ImageLoader.prototype.load = function(url, onLoad, onProgress, onError) {
                return originalLoad.call(this, url, onLoad, onProgress, (event) => {
                    if (typeof url === 'string' && url.startsWith('blob:')) {
                        const canvas = document.createElement('canvas');
                        canvas.width = 2;
                        canvas.height = 2;
                        const ctx = canvas.getContext('2d');
                        ctx.fillStyle = '#ffffff';
                        ctx.fillRect(0, 0, 2, 2);

                        if (onLoad) onLoad(canvas);
                        return;
                    }

                    if (onError) onError(event);
                });
            };

            THREE.ImageLoader.prototype.__blobTextureFallbackPatched = true;
        }

        async function loadGlbGeometryOnly(url, tint) {
            const response = await fetch(url);

            if (!response.ok) {
                throw new Error(`HTTP ${response.status} while loading ${url}`);
            }

            const arrayBuffer = await response.arrayBuffer();
            return buildGlbModelFromGeometry(arrayBuffer, tint);
        }

        function buildGlbModelFromGeometry(arrayBuffer, tint) {
            const { json, binaryChunk } = parseGlbFile(arrayBuffer);
            const sceneDef = json.scenes?.[json.scene ?? 0];
            const root = new THREE.Group();

            (sceneDef?.nodes || []).forEach((nodeIndex) => {
                root.add(buildGlbNode(nodeIndex, json, binaryChunk, tint));
            });

            return root;
        }

        function parseGlbFile(arrayBuffer) {
            const dataView = new DataView(arrayBuffer);
            const magic = dataView.getUint32(0, true);

            if (magic !== 0x46546C67) {
                throw new Error('Invalid GLB header.');
            }

            let json = null;
            let binaryChunk = null;
            let offset = 12;

            while (offset < dataView.byteLength) {
                const chunkLength = dataView.getUint32(offset, true);
                const chunkType = dataView.getUint32(offset + 4, true);
                const chunkStart = offset + 8;
                const chunkEnd = chunkStart + chunkLength;

                if (chunkType === 0x4E4F534A) {
                    json = JSON.parse(new TextDecoder().decode(arrayBuffer.slice(chunkStart, chunkEnd)));
                } else if (chunkType === 0x004E4942) {
                    binaryChunk = arrayBuffer.slice(chunkStart, chunkEnd);
                }

                offset = chunkEnd;
            }

            if (!json || !binaryChunk) {
                throw new Error('GLB is missing JSON or BIN chunk.');
            }

            return { json, binaryChunk };
        }

        function buildGlbNode(nodeIndex, json, binaryChunk, tint) {
            const nodeDef = json.nodes?.[nodeIndex] || {};
            const group = new THREE.Group();

            if (nodeDef.translation) group.position.fromArray(nodeDef.translation);
            if (nodeDef.rotation) group.quaternion.fromArray(nodeDef.rotation);
            if (nodeDef.scale) group.scale.fromArray(nodeDef.scale);

            if (nodeDef.mesh !== undefined) {
                group.add(buildGlbMesh(json.meshes[nodeDef.mesh], json, binaryChunk, tint));
            }

            (nodeDef.children || []).forEach((childIndex) => {
                group.add(buildGlbNode(childIndex, json, binaryChunk, tint));
            });

            return group;
        }

        function buildGlbMesh(meshDef, json, binaryChunk, tint) {
            const group = new THREE.Group();

            meshDef.primitives.forEach((primitive) => {
                const geometry = new THREE.BufferGeometry();
                const positionAttr = readGlbAccessor(primitive.attributes.POSITION, json, binaryChunk, false);
                const normalAttr = primitive.attributes.NORMAL !== undefined
                    ? readGlbAccessor(primitive.attributes.NORMAL, json, binaryChunk, false)
                    : null;
                const uvAttr = primitive.attributes.TEXCOORD_0 !== undefined
                    ? readGlbAccessor(primitive.attributes.TEXCOORD_0, json, binaryChunk, false)
                    : null;

                geometry.setAttribute('position', positionAttr);
                if (normalAttr) geometry.setAttribute('normal', normalAttr);
                if (uvAttr) geometry.setAttribute('uv', uvAttr);

                if (primitive.indices !== undefined) {
                    geometry.setIndex(readGlbAccessor(primitive.indices, json, binaryChunk, true));
                }

                if (!normalAttr) {
                    geometry.computeVertexNormals();
                }

                geometry.computeBoundingBox();

                const material = createGeometryOnlyMaterial(tint);
                const mesh = new THREE.Mesh(geometry, material);
                group.add(mesh);
            });

            return group;
        }

        function readGlbAccessor(accessorIndex, json, binaryChunk, isIndex) {
            const accessorDef = json.accessors?.[accessorIndex];
            const bufferViewDef = json.bufferViews?.[accessorDef.bufferView];
            const itemSizeMap = {
                SCALAR: 1,
                VEC2: 2,
                VEC3: 3,
                VEC4: 4,
                MAT2: 4,
                MAT3: 9,
                MAT4: 16
            };
            const typedArrayMap = {
                5120: Int8Array,
                5121: Uint8Array,
                5122: Int16Array,
                5123: Uint16Array,
                5125: Uint32Array,
                5126: Float32Array
            };
            const bytesPerElementMap = {
                5120: 1,
                5121: 1,
                5122: 2,
                5123: 2,
                5125: 4,
                5126: 4
            };

            const itemSize = itemSizeMap[accessorDef.type];
            const TypedArrayCtor = typedArrayMap[accessorDef.componentType];
            const bytesPerElement = bytesPerElementMap[accessorDef.componentType];
            const byteOffset = (bufferViewDef.byteOffset || 0) + (accessorDef.byteOffset || 0);
            const elementCount = accessorDef.count * itemSize;

            let array;

            if (bufferViewDef.byteStride && bufferViewDef.byteStride !== itemSize * bytesPerElement) {
                array = new TypedArrayCtor(elementCount);

                for (let i = 0; i < accessorDef.count; i++) {
                    const sourceOffset = byteOffset + (i * bufferViewDef.byteStride);
                    const sourceView = new TypedArrayCtor(binaryChunk, sourceOffset, itemSize);
                    array.set(sourceView, i * itemSize);
                }
            } else {
                array = new TypedArrayCtor(binaryChunk, byteOffset, elementCount);
            }

            return new THREE.BufferAttribute(array, isIndex ? 1 : itemSize, accessorDef.normalized === true);
        }

        function createGeometryOnlyMaterial(tint) {
            const tintColor = new THREE.Color(tint);

            return new THREE.MeshPhysicalMaterial({
                color: tintColor.clone().lerp(new THREE.Color(0xffffff), 0.2).lerp(new THREE.Color(0x1b2256), 0.06),
                emissive: tintColor.clone().multiplyScalar(0.36),
                emissiveIntensity: 0.78,
                roughness: 0.28,
                metalness: 0.32,
                clearcoat: 0.45,
                clearcoatRoughness: 0.2,
                reflectivity: 0.7,
                side: THREE.DoubleSide
            });
        }

        function fitModelIntoSlot(model, targetSize) {
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const maxDimension = Math.max(size.x, size.y, size.z) || 1;
            const scale = targetSize / maxDimension;

            model.scale.setScalar(scale);
            model.updateMatrixWorld(true);

            const fittedBox = new THREE.Box3().setFromObject(model);
            const fittedCenter = fittedBox.getCenter(new THREE.Vector3());
            model.position.sub(fittedCenter);
        }

        function stylizeModelMaterials(model, tint) {
            const tintColor = new THREE.Color(tint);

            model.traverse((child) => {
                if (!child.isMesh || !child.material) return;

                child.castShadow = false;
                child.receiveShadow = false;

                const materials = Array.isArray(child.material) ? child.material : [child.material];
                child.material = materials.map((material) => {
                    const nextMaterial = material.clone();

                    if (nextMaterial.color && !nextMaterial.map) {
                        const brightness = nextMaterial.color.r + nextMaterial.color.g + nextMaterial.color.b;
                        if (brightness > 2.5) {
                            nextMaterial.color.lerp(tintColor, 0.8);
                        } else {
                            nextMaterial.color.lerp(tintColor, 0.38);
                        }
                    }

                    if ('roughness' in nextMaterial) {
                        nextMaterial.roughness = Math.min(nextMaterial.roughness ?? 0.65, 0.5);
                    }

                    if ('metalness' in nextMaterial) {
                        nextMaterial.metalness = Math.max(nextMaterial.metalness ?? 0.1, 0.22);
                    }

                    if ('emissive' in nextMaterial) {
                        nextMaterial.emissive = tintColor.clone().multiplyScalar(0.3);
                        nextMaterial.emissiveIntensity = 1.15;
                    }

                    nextMaterial.needsUpdate = true;
                    return nextMaterial;
                });
            });
        }

        function createFallbackOrnament(replacement) {
            const tintColor = new THREE.Color(replacement.tint);
            const group = new THREE.Group();
            const material = new THREE.MeshStandardMaterial({
                color: tintColor.clone().lerp(new THREE.Color(0xffffff), 0.18),
                emissive: tintColor.clone().multiplyScalar(0.45),
                emissiveIntensity: 1.2,
                roughness: 0.38,
                metalness: 0.22
            });

            let mesh;

            if (replacement.file.includes('花瓶')) {
                mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.34, 0.52, 1.5, 24), material);
            } else if (replacement.file.includes('风铃')) {
                mesh = new THREE.Mesh(new THREE.TorusKnotGeometry(0.5, 0.14, 120, 18), material);
                mesh.scale.set(0.85, 1.2, 0.85);
            } else if (replacement.file.includes('鱼耳环')) {
                mesh = new THREE.Mesh(new THREE.TorusGeometry(0.48, 0.12, 18, 40), material);
                const bead = new THREE.Mesh(new THREE.SphereGeometry(0.14, 20, 20), material.clone());
                bead.position.set(0, -0.62, 0);
                group.add(bead);
            } else {
                mesh = new THREE.Mesh(new THREE.TorusGeometry(0.52, 0.16, 18, 48), material);
            }

            mesh.rotation.x = 0.28;
            group.add(mesh);
            fitModelIntoSlot(group, replacement.targetSize);
            return group;
        }

        function createGlowTexture() {
            const size = 256;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;

            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.3, 'rgba(255,255,255,0.75)');
            gradient.addColorStop(0.65, 'rgba(255,255,255,0.22)');
            gradient.addColorStop(1, 'rgba(255,255,255,0)');

            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, size, size);

            const texture = new THREE.CanvasTexture(canvas);
            texture.encoding = THREE.sRGBEncoding;
            return texture;
        }

        function createGlowPlane(width, height, color, opacity) {
            const geometry = new THREE.PlaneGeometry(width, height);
            const material = new THREE.MeshBasicMaterial({
                map: glowTexture,
                color,
                transparent: true,
                opacity,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                side: THREE.DoubleSide,
                toneMapped: false
            });

            return new THREE.Mesh(geometry, material);
        }

        function createWireframe() {
            
            const points = [];
            const radius = 6;
            const heightStep = 1.8;
            const angleStep = Math.PI / 3.5;
            const totalItems = CARD_DATA.length;

            for (let i = 0; i < totalItems; i++) {
                 const angle = i * angleStep;
                 const y = (i * heightStep) - (totalItems * heightStep / 2);
                 const x = Math.cos(angle) * radius;
                 const z = Math.sin(angle) * radius;
                 points.push(new THREE.Vector3(x, y, z));
            }

            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const material = new THREE.LineBasicMaterial({ 
                color: 0xF6F4F9,
                opacity: 0.16,
                transparent: true,
                linewidth: 1
            });
            const spiralLine = new THREE.Line(geometry, material);
            vortexGroup.add(spiralLine);

            
            
            const itemsPerRotation = Math.floor((Math.PI * 2) / angleStep);
            
            const verticalPoints = [];
            for (let i = 0; i < totalItems - itemsPerRotation; i++) {
                const p1 = points[i];
                const p2 = points[i + itemsPerRotation];
                if(p1 && p2) {
                    verticalPoints.push(p1);
                    verticalPoints.push(p2);
                }
            }
            
            const vGeometry = new THREE.BufferGeometry().setFromPoints(verticalPoints);
            const vLines = new THREE.LineSegments(vGeometry, material);
            vortexGroup.add(vLines);

            
            const axisPoints = [
                new THREE.Vector3(0, -30, 0),
                new THREE.Vector3(0, 30, 0)
            ];
            const axisGeo = new THREE.BufferGeometry().setFromPoints(axisPoints);
            const axisLine = new THREE.Line(axisGeo, new THREE.LineBasicMaterial({ color: 0xB780CF, opacity: 0.12, transparent: true }));
            vortexGroup.add(axisLine);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            if (isDragging) {
                const deltaX = event.clientX - previousMousePosition.x;
                const deltaY = event.clientY - previousMousePosition.y;
                
                targetRotationY += deltaX * 0.005;
                targetScrollPos += deltaY * 0.05;
                
                previousMousePosition = { x: event.clientX, y: event.clientY };
            }

            if (!isDragging) {
                raycaster.setFromCamera(mouse, camera);
                const cardHits = raycaster.intersectObjects(cards, true);
                const galleryMeshes = floatingGalleryItems.map((item) => item.mesh);
                const galleryHits = galleryMeshes.length ? raycaster.intersectObjects(galleryMeshes, true) : [];
                const nearestCard = cardHits[0];
                const nearestGallery = galleryHits[0];

                let hoveredRoot = null;
                if (nearestGallery && (!nearestCard || nearestGallery.distance < nearestCard.distance)) {
                    let o = nearestGallery.object;
                    while (o && !o.userData.galleryRoot) {
                        o = o.parent;
                    }
                    hoveredRoot = o;
                }
                hoveredFloatingMesh = hoveredRoot;
            }
        }

        function onMouseDown(event) {
            isDragging = true;
            previousMousePosition = { x: event.clientX, y: event.clientY };
        }

        function onMouseUp(event) {
            isDragging = false;
            
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(cards, true);

            if (intersects.length > 0) {
                const cardData = intersects[0].object.userData.cardData;

                if (cardData) {
                    openModal(cardData);
                }
            }
        }

        function onWheel(event) {
            event.preventDefault();
            
            targetScrollPos += event.deltaY * 0.01;
            targetRotationY += event.deltaY * 0.001;
        }

        function animate() {
            requestAnimationFrame(animate);

            
            currentRotationY += (targetRotationY - currentRotationY) * 0.05;
            vortexGroup.rotation.y = currentRotationY;

            
            scrollPos += (targetScrollPos - scrollPos) * 0.05;
            
            
            const maxScroll = BUMENG_SCROLL_MAX;
            if(scrollPos > maxScroll) { targetScrollPos = maxScroll; }
            if(scrollPos < -maxScroll) { targetScrollPos = -maxScroll; }
            
            vortexGroup.position.y = scrollPos;

            updateBumengScrollBackground();

            
            if (!isDragging) {
                targetRotationY += 0.0005; 
            }

            const time = performance.now() * 0.001;
            modelAnchors.forEach((item) => {
                item.wrapper.rotation.y = time * item.spinSpeed;
                item.wrapper.position.y = item.baseY + Math.sin(time * 1.4 + item.phase) * item.floatAmp;
                if (item.glow) {
                    item.glow.material.opacity = 0.34 + ((Math.sin(time * 2 + item.phase) + 1) * 0.12);
                }
            });

            floatingGalleryItems.forEach((item) => {
                item.mesh.position.set(
                    item.baseX,
                    item.baseY + Math.sin(time * item.floatSpeed + item.phase) * item.floatAmp,
                    item.baseZ + Math.cos(time * (item.floatSpeed * 0.7) + item.phase) * item.depthDrift
                );
                item.mesh.lookAt(FLOATING_GALLERY_LOOK_TARGET);
                item.mesh.rotateX(item.pitchOffset + Math.sin(time * 0.32 + item.phase) * 0.028);
                item.mesh.rotateZ(item.rollOffset + Math.sin(time * 0.26 + item.phase) * 0.022);
                const targetScale = item.mesh === hoveredFloatingMesh ? item.hoverScale : item.baseScale;
                item.currentScale += (targetScale - item.currentScale) * 0.12;
                item.mesh.scale.setScalar(item.currentScale);
            });

            if (floatingGallery) {
                floatingGallery.position.x = Math.sin(time * 0.08) * 0.9;
                floatingGallery.position.y = Math.cos(time * 0.06) * 0.45;
                floatingGallery.position.z = Math.sin(time * 0.05) * 1.6;
            }

            renderer.render(scene, camera);
        }

        
        
        const modalBackdrop = document.getElementById('modal-backdrop');
        const modalContent = document.getElementById('modal-content');
        const closeModalBtn = document.getElementById('close-modal');

        function openModal(data) {
            const modalImage = document.getElementById('modal-image');
            const modalTitle = document.getElementById('modal-title');
            const modalSubtitle = document.getElementById('modal-subtitle');
            const modalDesc = document.getElementById('modal-description');
            const modalTypeBadge = document.getElementById('modal-type-badge');
            const modalMetrics = document.getElementById('modal-metrics');
            const modalBioStats = document.getElementById('modal-bio-stats');
            const modalTags = document.getElementById('modal-tags');
            const modalId = document.getElementById('modal-id');

            
            modalImage.src = data.img;
            modalTitle.innerText = data.title;
            modalSubtitle.innerText = `${data.client} // 2023`;
            modalDesc.innerText = data.desc;
            modalTypeBadge.innerText = data.type;
            modalId.innerText = `#0${data.id < 10 ? '0'+data.id : data.id}`;

            
            const typeColor = COLORS[data.type] || COLORS.text;
            modalTypeBadge.style.backgroundColor = typeColor;
            modalTypeBadge.style.borderColor = 'rgba(246, 244, 249, 0.25)';
            modalTypeBadge.style.color = data.type === 'editing' || data.type === 'personal' ? COLORS.ink : COLORS.text;

            
            if (data.metrics) {
                modalMetrics.classList.remove('hidden');
                modalMetrics.classList.add('grid');
                modalBioStats.classList.add('hidden');
                modalBioStats.classList.remove('grid');
            } else if (data.bio) {
                modalMetrics.classList.add('hidden');
                modalMetrics.classList.remove('grid');
                modalBioStats.classList.remove('hidden');
                modalBioStats.classList.add('grid');
            } else {
                modalMetrics.classList.add('hidden');
                modalBioStats.classList.add('hidden');
            }

            
            modalTags.innerHTML = '';
            const tags = getTagsForType(data.type);
            tags.forEach(tag => {
                const span = document.createElement('span');
                span.className = 'px-2 py-1 bg-[#F6F4F9]/10 text-[10px] uppercase font-bold text-[#F6F4F9] rounded-sm border border-[#F6F4F9]/10';
                span.innerText = tag;
                modalTags.appendChild(span);
            });

            
            modalBackdrop.classList.remove('hidden');
            
            setTimeout(() => {
                modalBackdrop.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
                modalContent.classList.add('scale-100');
            }, 10);
        }

        function closeModal() {
            modalBackdrop.classList.add('opacity-0');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            
            setTimeout(() => {
                modalBackdrop.classList.add('hidden');
            }, 300);
        }

        closeModalBtn.addEventListener('click', closeModal);
        modalBackdrop.addEventListener('click', (e) => {
            if (e.target === modalBackdrop) closeModal();
        });

        function getTagsForType(type) {
            const map = {
                'creative': ['Art Direction', 'Concept', 'Visuals'],
                'media': ['Paid Social', 'Analytics', 'Strategy'],
                'editing': ['Premiere', 'After Effects', 'Sound'],
                'coding': ['JavaScript', 'WebGL', 'Frontend'],
                'personal': ['Lifestyle', 'Travel', 'Portrait'],
                'dog': ['Good Boy', 'Treats', 'Walks']
            };
            return map[type] || ['General'];
        }

        
        window.startBumeng = init;

        if (!window.__bumengEmbedPending) {
            window.startBumeng();
            window.__started = true;
        }

    </script>
